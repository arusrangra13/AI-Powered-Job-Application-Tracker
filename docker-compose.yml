version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobtracker-db
    environment:
      POSTGRES_DB: jobtracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobtracker-backend
    ports:
      - '5000:5000'
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/jobtracker
      - JWT_SECRET=super-secret-jwt-key-please-change-in-production
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
      - NLP_SERVICE_URL=http://nlp-service:8000
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  nlp-service:
    build:
      context: ./nlp-service
      dockerfile: Dockerfile
    container_name: jobtracker-nlp
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobtracker-frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:5000

volumes:
  postgres_data:
